<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>super-ppt 编辑器跳转中</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background: #f5f7fa;
        color: #1f1f1f;
      }

      body {
        display: grid;
        place-items: center;
      }

      .card {
        width: min(480px, calc(100vw - 40px));
        padding: 28px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 20px 48px rgba(15, 23, 42, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 22px;
      }

      p {
        margin: 0;
        color: #595959;
        line-height: 1.75;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>正在跳转到独立 PPT 编辑器</h1>
      <p id="message">如果没有自动跳转，请检查 `super-ppt-editor` 服务是否已启动。</p>
    </div>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var jobId = (params.get('jobId') || '').trim();
        var target = new URL(window.location.protocol + '//' + window.location.hostname + ':8001/');

        if (!jobId) {
          document.getElementById('message').textContent = '缺少 jobId，请从 super-ppt 调试结果页重新打开独立编辑器。';
          return;
        }

        target.searchParams.set('jobId', jobId);
        window.location.replace(target.toString());
      })();
    </script>
  </body>
</html>
